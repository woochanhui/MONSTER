<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="stone-texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE047"/>
      <stop offset="0.5" stop-color="#EAB308"/>
      <stop offset="1" stop-color="#CA8A04"/>
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Deep Charcoal Stone Background -->
  <rect width="800" height="600" fill="#121212"/>
  <rect width="800" height="600" fill="white" filter="url(#stone-texture)" opacity="0.2"/>

  <!-- Minimalist Gold Border -->
  <rect x="40" y="40" width="720" height="520" stroke="url(#gold-grad)" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Central Focal Point (Abstract Plating) -->
  <circle cx="400" cy="320" r="180" fill="#1A1A1A" shadow="0 30px 60px rgba(0,0,0,0.5)"/>
  <circle cx="400" cy="320" r="179" stroke="url(#gold-grad)" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Artistic Garnish Lines -->
  <path d="M300 320C300 250 500 250 500 320" stroke="url(#gold-grad)" stroke-width="1" stroke-dasharray="1 10" opacity="0.5"/>
  <circle cx="400" cy="320" r="4" fill="url(#gold-grad)" filter="url(#soft-glow)"/>
  
  <!-- Sophisticated Typography -->
  <text x="400" y="140" text-anchor="middle" fill="url(#gold-grad)" font-family="serif" font-weight="200" font-size="12" letter-spacing="8" opacity="0.8">THE ART OF GASTRONOMY</text>
  
  <g transform="translate(400, 200)">
    <text text-anchor="middle" fill="white" font-family="serif" font-weight="900" font-size="56" letter-spacing="4">CULINARY</text>
    <text y="50" text-anchor="middle" fill="url(#gold-grad)" font-family="serif" font-style="italic" font-weight="400" font-size="32" letter-spacing="2">Artisan Experience</text>
  </g>

  <!-- Bottom Details -->
  <g opacity="0.4">
    <rect x="380" y="480" width="40" height="1" fill="url(#gold-grad)"/>
    <text x="400" y="510" text-anchor="middle" fill="white" font-family="serif" font-size="10" letter-spacing="4">ESTABLISHED MMXXVI</text>
  </g>

  <!-- Decorative Corner Elements -->
  <path d="M40 100V40H100" stroke="url(#gold-grad)" stroke-width="1" opacity="0.5"/>
  <path d="M700 560H760V500" stroke="url(#gold-grad)" stroke-width="1" opacity="0.5"/>
</svg>