<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>YouTube - 싫어요한 영상</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
            rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <style>
        .liked-shell {
            display: flex;
            min-height: calc(100vh - 56px);
        }

        .sidebar {
            width: 240px;
            background: #0f0f0f;
            border-right: 1px solid #222;
            padding: 12px 10px;
            position: sticky;
            top: 56px;
            height: calc(100vh - 56px);
            overflow-y: auto;
            flex-shrink: 0;
            transition: width 0.22s ease, transform 0.22s ease;
        }

        .sidebar.is-collapsed {
            width: 72px;
            padding-left: 8px;
            padding-right: 8px;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 16px;
            min-height: 40px;
            padding: 0 12px;
            border-radius: 10px;
            color: #f1f1f1;
            transition: background 0.18s ease;
        }

        .sidebar-link:hover {
            background: #222;
        }

        .sidebar-link.is-active {
            background: #272727;
            font-weight: 700;
        }

        .sidebar-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .sidebar-label {
            font-size: 14px;
            white-space: nowrap;
        }

        .sidebar.is-collapsed .sidebar-link {
            justify-content: center;
            padding: 0;
            min-height: 64px;
            flex-direction: column;
            gap: 6px;
            border-radius: 12px;
        }

        .sidebar.is-collapsed .sidebar-label {
            font-size: 11px;
            line-height: 1.2;
            text-align: center;
        }

        .liked-content {
            flex: 1;
            min-width: 0;
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .menu-btn:hover {
            background: #222;
        }

        .menu-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .topbar-left {
            gap: 4px;
        }

        .mobile-sidebar-backdrop {
            display: none;
        }

        .liked-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .liked-header-text {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .liked-kicker {
            margin: 0;
            color: #9aa0a6;
            font-size: 13px;
        }

        .liked-title {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.35;
        }

        .liked-count {
            margin: 0;
            color: #b6b6b6;
            font-size: 14px;
        }

        .liked-search-wrap {
            margin-bottom: 22px;
        }

        .liked-search-form {
            width: 100%;
            max-width: 520px;
            display: flex;
            align-items: center;
            border: 1px solid #303030;
            border-radius: 999px;
            background: #121212;
            overflow: hidden;
        }

        .liked-search-input {
            flex: 1;
            height: 44px;
            border: none;
            outline: none;
            background: transparent;
            color: #fff;
            padding: 0 16px;
            font-size: 14px;
        }

        .liked-search-btn {
            width: 60px;
            height: 44px;
            border: none;
            border-left: 1px solid #303030;
            background: #222;
            color: #fff;
            cursor: pointer;
        }

        .liked-search-btn:hover {
            background: #2a2a2a;
        }

        .liked-search-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .liked-empty-state {
            color: #9aa0a6;
            text-align: center;
            padding: 52px 16px;
            font-size: 15px;
            line-height: 1.7;
        }

        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                top: 56px;
                left: 0;
                width: 240px;
                height: calc(100vh - 56px);
                z-index: 120;
                transform: translateX(-100%);
                box-shadow: 12px 0 30px rgba(0, 0, 0, 0.35);
            }

            .sidebar.is-open {
                transform: translateX(0);
            }

            .sidebar.is-collapsed {
                width: 240px;
                padding-left: 10px;
                padding-right: 10px;
            }

            .sidebar.is-collapsed .sidebar-link {
                justify-content: flex-start;
                padding: 0 12px;
                min-height: 40px;
                flex-direction: row;
                gap: 16px;
                border-radius: 10px;
            }

            .sidebar.is-collapsed .sidebar-label {
                font-size: 14px;
                text-align: left;
            }

            .mobile-sidebar-backdrop {
                display: block;
                position: fixed;
                inset: 56px 0 0 0;
                background: rgba(0, 0, 0, 0.45);
                z-index: 110;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s ease;
            }

            .mobile-sidebar-backdrop.is-open {
                opacity: 1;
                pointer-events: auto;
            }

            .liked-content {
                width: 100%;
            }

            .liked-title {
                font-size: 21px;
            }
        }
    </style>
</head>
<body data-page="liked">
<header class="topbar">
    <div class="topbar-left">
        <button type="button" class="menu-btn" id="menuToggle" aria-label="메뉴 열기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18v2H3V6Zm0 5h18v2H3v-2Zm0 5h18v2H3v-2Z"></path>
            </svg>
        </button>

        <a href="index.html" class="logo-wrap" aria-label="MyTube 홈">
            <span class="logo-badge">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
                    <rect x="4" y="7" width="16" height="10" rx="2" stroke="white" stroke-width="1.4"/>
                    <rect x="2" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="2" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="9.5" width="2" height="2" rx="0.5" fill="white"/>
                    <rect x="20" y="12.5" width="2" height="2" rx="0.5" fill="white"/>
                    <path d="M10.5 10l4 2-4 2v-4z" fill="white"/>
                </svg>
            </span>
            <span class="logo-text">MY</span>
        </a>
    </div>

    <div class="topbar-center">
        <form class="search-form" onsubmit="return false;">
            <input type="text" placeholder="검색" aria-label="검색" />
            <button type="submit" class="search-btn" aria-label="검색 버튼">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10 4a6 6 0 1 0 3.87 10.58l4.27 4.27 1.41-1.41-4.27-4.27A6 6 0 0 0 10 4Zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"></path>
                </svg>
            </button>
        </form>
    </div>

    <div class="topbar-right">
        <a href="upload.html" class="icon-btn" aria-label="업로드">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M11 6h2v5h5v2h-5v5h-2v-5H6v-2h5V6Z"></path>
            </svg>
        </a>
        <a href="channel.html" class="profile" aria-label="내 채널">T</a>
    </div>
</header>

<div class="mobile-sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="liked-shell">
    <aside class="sidebar is-collapsed" id="sidebar">
        <nav class="sidebar-section">
            <a href="index.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 10.5 12 4l8 6.5V20h-5v-5h-6v5H4v-9.5Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">홈</span>
            </a>
        </nav>

        <nav class="sidebar-section">
            <a href="saved.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M17 3H7a2 2 0 0 0-2 2v16l7-4 7 4V5a2 2 0 0 0-2-2Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">저장한 영상</span>
            </a>

            <a href="liked.html" class="sidebar-link is-active">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m12 21-1.45-1.32C5.4 15.05 2 11.97 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09A6 6 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.47-3.4 6.55-8.55 11.18L12 21Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">좋아요한 영상</span>
            </a>
            <a href="history.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m12 21-1.45-1.32C5.4 15.05 2 11.97 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09A6 6 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.47-3.4 6.55-8.55 11.18L12 21Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">시청 기록</span>
            </a>
        </nav>

        <nav class="sidebar-section">
            <a href="channel.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">내 채널</span>
            </a>

            <a href="upload.html" class="sidebar-link">
                <span class="sidebar-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M11 6h2v5h5v2h-5v5h-2v-5H6v-2h5V6Z"></path>
                    </svg>
                </span>
                <span class="sidebar-label">업로드</span>
            </a>
        </nav>
    </aside>

    <main class="main liked-content">
        <section class="liked-header">
            <div class="liked-header-text">
                <p class="liked-kicker" id="likedKicker">보관함</p>
                <h2 class="liked-title" id="likedTitle">좋아요한 영상</h2>
                <p class="liked-count" id="likedCountText">좋아요한 영상 0개</p>
            </div>
        </section>

        <section class="liked-search-wrap">
            <form class="liked-search-form" id="likedSearchForm">
                <input
                        type="text"
                        class="liked-search-input"
                        id="likedSearchInput"
                        placeholder="좋아요한 영상 검색"
                        aria-label="좋아요한 영상 검색"
                />
                <button type="submit" class="liked-search-btn" aria-label="좋아요한 영상 검색 버튼">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M10 4a6 6 0 1 0 3.87 10.58l4.27 4.27 1.41-1.41-4.27-4.27A6 6 0 0 0 10 4Zm0 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"></path>
                    </svg>
                </button>
            </form>
        </section>

        <section class="video-grid" id="likedVideoGrid"></section>
        <p class="liked-empty-state" id="likedEmptyState" hidden>
            아직 좋아요한 영상이 없습니다. 마음에 드는 영상에 좋아요를 눌러봐.
        </p>
    </main>
</div>

<script src="auth.js?v=5"></script>
<script src="script.js?v=5"></script>
<script>
    (function () {
        const sidebar = document.getElementById("sidebar");
        const menuToggle = document.getElementById("menuToggle");
        const backdrop = document.getElementById("sidebarBackdrop");

        if (!sidebar || !menuToggle || !backdrop) return;

        function isMobile() {
            return window.innerWidth <= 900;
        }

        function closeMobileSidebar() {
            sidebar.classList.remove("is-open");
            backdrop.classList.remove("is-open");
        }

        function toggleDesktopSidebar() {
            sidebar.classList.toggle("is-collapsed");
        }

        menuToggle.addEventListener("click", () => {
            if (isMobile()) {
                sidebar.classList.toggle("is-open");
                backdrop.classList.toggle("is-open");
            } else {
                toggleDesktopSidebar();
            }
        });

        backdrop.addEventListener("click", closeMobileSidebar);

        window.addEventListener("resize", () => {
            if (!isMobile()) {
                closeMobileSidebar();
            }
        });
    })();
</script>
</body>
